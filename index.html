<!DOCTYPE html>
<html lang="ko">
<head>

  <title>교통사고를 당했는데 눈 떠보니 예루살렘이라니요!?</title>
  <style>
    :root{--text:#f5d7a1;--muted:#c8a46b;--line:rgba(212,175,122,.3);--shadow:0 12px 28px rgba(0,0,0,.4)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:linear-gradient(180deg,#2b160a 0%,#140a05 100%);color:var(--text)}
    .wrap{max-width:430px;min-height:100vh;margin:0 auto;padding:14px 12px 18px;display:flex;flex-direction:column;gap:10px}
    .title,.dialogue,.quiz-card,.result-card{background:linear-gradient(135deg,rgba(40,24,14,.92),rgba(20,10,5,.96));border:1px solid rgba(212,175,122,.3);border-radius:22px;padding:16px;box-shadow:var(--shadow)}
    h1{margin:0;text-align:center;font-size:21px;line-height:1.4;font-family:'Nanum Myeongjo','Batang',serif}
    .scene{position:relative;border-radius:24px;overflow:hidden;min-height:290px;background:#dbeafe;box-shadow:var(--shadow)}
    .scene-art{aspect-ratio:1/1;width:100%;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative}.scene-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.22))}
    .tap-challenge{position:absolute;left:16px;right:16px;bottom:16px;z-index:3;display:none;flex-direction:column;gap:10px}.tap-label{font-size:12px;color:#fff4d6;text-align:center;line-height:1.5;text-shadow:0 2px 8px rgba(0,0,0,.45)}.tap-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);overflow:hidden}.tap-fill{width:0;height:100%;background:linear-gradient(90deg,#d4af7a,#f5d7a1);transition:width .06s linear}
    .bubble{min-height:84px;background:rgba(20,10,5,.9);border:1px solid rgba(212,175,122,.2);border-radius:18px;padding:14px;line-height:1.75;font-size:16px;word-break:keep-all}
    .controls,.quiz-actions,.start-actions{display:flex;gap:8px;margin-top:12px}
    button{appearance:none;border:1px solid rgba(212,175,122,.4);background:rgba(40,24,14,.8);color:var(--text);border-radius:16px;padding:13px 14px;font-size:15px;font-weight:700;box-shadow:var(--shadow);cursor:pointer;flex:1}
    button.primary{background:linear-gradient(135deg,#d4af7a,#8b6a3e);color:#2b160a;border:none} button.ghost{background:rgba(60,30,15,.95)} button:disabled{opacity:1;cursor:default;background:linear-gradient(135deg,#4b3a29,#2b2118);color:#9f8a72;border:1px solid rgba(159,138,114,.45);box-shadow:none} button.waiting{background:linear-gradient(135deg,#4b3a29,#2b2118)!important;color:#9f8a72!important;border:1px solid rgba(159,138,114,.45)!important;box-shadow:none!important} button.ready{animation:readyPulse .8s ease 1} @keyframes readyPulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
    .letters{background:linear-gradient(135deg,#fff,#fff7ed);border:1px solid #fde7c3;border-radius:22px;padding:14px;box-shadow:var(--shadow);color:#5a3b1e}.letters h2,.quiz-card h2,.result-card h2{margin:0 0 10px;font-size:15px}.letter-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px}.letter-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#fff;border:1px dashed #f0b978;border-radius:12px;font-weight:800;font-size:15px;color:#5a3b1e}.empty{color:#cbd5e1}.letter-note{margin-top:10px;font-size:12px;color:#8a5a1d;line-height:1.5}
    .question{font-size:17px;font-weight:800;line-height:1.6;margin-bottom:12px}.coin-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}.coin-btn{aspect-ratio:1/1;border-radius:999px;border:2px solid #cbd5e1;background:#fff;padding:0;min-width:0;position:relative;color:#5a3b1e;font-weight:700;font-size:14px}.coin-btn.selected{border-color:#64748b;background:radial-gradient(circle at 35% 35%,#f1f5f9 0%,#94a3b8 48%,#475569 100%)}.coin-btn.selected::after{content:'◉';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);font-size:16px}.coin-count{text-align:center;margin-top:12px;font-size:14px;font-weight:700}.choice,.input{background:#fff;color:#1f2937;border:1px solid var(--line);border-radius:16px}.choice{text-align:left}.input{width:100%;padding:14px;font-size:16px;outline:none}.feedback{margin-top:12px;padding:12px;border-radius:14px;font-size:14px;line-height:1.6}.good{background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}.bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}.ending-box{margin-top:12px;position:relative;background:radial-gradient(circle at 50% 20%, rgba(255,215,120,0.15), transparent 60%),linear-gradient(135deg, rgba(40,24,14,0.95), rgba(20,10,5,0.98));border:1px solid rgba(212,175,122,0.35);border-radius:18px;padding:16px;line-height:1.8;font-size:15px;color:#f5d7a1;box-shadow:0 12px 28px rgba(0,0,0,0.5);overflow:hidden} .ending-box::before{content:"";position:absolute;inset:0;background:radial-gradient(circle, rgba(255,220,140,0.25), transparent 70%);opacity:0;animation:endingGlow 3s ease-in-out forwards} @keyframes endingGlow{0%{opacity:0}50%{opacity:1}100%{opacity:0.4}}
    .hidden,.speaker{display:none}.particle-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}.particle-layer span{position:absolute;width:30px;height:30px;background:rgba(255,255,255,.6);border-radius:50%;animation:floatUp 8s linear infinite;opacity:.6}
    .particle-layer span:nth-child(1){left:10%;top:60%;animation-duration:9s}.particle-layer span:nth-child(2){left:25%;top:55%;animation-duration:7s}.particle-layer span:nth-child(3){left:40%;top:65%;animation-duration:8s}.particle-layer span:nth-child(4){left:55%;top:58%;animation-duration:10s}.particle-layer span:nth-child(5){left:70%;top:62%;animation-duration:9s}.particle-layer span:nth-child(6){left:85%;top:57%;animation-duration:7s}.particle-layer span:nth-child(7){left:15%;top:70%;animation-duration:8s}.particle-layer span:nth-child(8){left:35%;top:68%;animation-duration:9s}.particle-layer span:nth-child(9){left:60%;top:66%;animation-duration:11s}.particle-layer span:nth-child(10){left:80%;top:63%;animation-duration:8s}
    @keyframes floatUp{0%{transform:translateY(100%) scale(.8);opacity:0}20%{opacity:.7}100%{transform:translateY(-120%) scale(1.2);opacity:0}} .glow-text{display:block;text-align:center;font-weight:800;font-size:28px;letter-spacing:.08em;color:#fff7cc;text-shadow:0 0 8px rgba(255,244,181,.95),0 0 16px rgba(255,226,122,.85),0 0 28px rgba(255,211,77,.75),0 0 42px rgba(255,211,77,.55);animation:glowPulse 2s ease-in-out infinite;margin:8px 0 10px} @keyframes glowPulse{0%,100%{transform:scale(1);text-shadow:0 0 8px rgba(255,244,181,.95),0 0 16px rgba(255,226,122,.85),0 0 28px rgba(255,211,77,.75),0 0 42px rgba(255,211,77,.55)}50%{transform:scale(1.03);text-shadow:0 0 10px rgba(255,248,205,1),0 0 20px rgba(255,233,140,.95),0 0 34px rgba(255,214,92,.85),0 0 52px rgba(255,214,92,.65)}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="title" id="titleSection"><h1>교통사고를 당했는데<br>눈 떠보니 예루살렘이라니요!?</h1></section>
    <section class="result-card" id="startSection">
      <div style="text-align:center;"><h1 style="margin-bottom:16px;font-size:22px;line-height:1.4;">교통사고를 당했는데<br>눈 떠보니 예루살렘이라니요!?</h1></div>
      <div style="position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;background:#fff;"><img src="./image/1.jpg" alt="1번 이미지" style="display:block;width:100%;height:auto;" /><div class="particle-layer"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
      <div class="start-actions"><button class="primary" id="startBtn">게임 시작</button></div>
    </section>
    <section id="storySection" class="hidden"><div class="scene"><div class="scene-art" id="sceneArt"><div class="scene-overlay"></div><div class="tap-challenge" id="tapChallenge"><div class="tap-label" id="tapLabel">터치해서 힘을 보태세요</div><div class="tap-bar"><div class="tap-fill" id="tapFill"></div></div></div></div></div><div class="dialogue"><div class="speaker" id="speaker">주인공</div><div class="bubble" id="bubble"></div><div class="controls"><button class="ghost" id="prevBtn">◀ 이전</button><button class="primary" id="nextBtn">다음 ▶</button></div></div></section>
    <section class="letters hidden" id="lettersSection"><h2>획득한 단서</h2><div class="letter-grid" id="letterGrid"></div><div class="letter-note" id="letterNote">각 퀴즈를 풀면 정답 조합에 필요한 단서를 하나씩 얻습니다. 순서는 섞여 있습니다.</div></section>
    <section class="quiz-card hidden" id="quizSection"><div style="display:flex;gap:8px;margin-bottom:10px;"><button class="ghost" id="quizPrevBtn">◀ 이전 (스토리)</button></div><h2>퀴즈</h2><div class="question" id="quizQuestion"></div><div id="quizBody"></div><div class="feedback hidden" id="quizFeedback"></div><div class="quiz-actions hidden" id="quizNextWrap"><button class="primary" id="quizNextBtn">다음 ▶</button></div></section>
    <section class="result-card hidden" id="finalSection"><h2>최종 정답</h2><div class="question">지금까지 모은 단서를 조합해 마지막 정답을 입력하세요.</div><input class="input" id="finalInput" placeholder="정답을 입력하세요" /><div class="quiz-actions"><button class="primary" id="finalSubmit">최종 정답 제출</button></div><div class="feedback hidden" id="finalFeedback"></div><div class="ending-box hidden" id="endingBox"></div></section>
    <div id="pageNumber" style="text-align:center;font-size:12px;color:#94a3b8;margin-top:6px;"></div>
  </div>
  <script>
    const storyData=[
      {lines:['오늘은 교복데이라 교복을 입고 교회를 가는 길이다.','횡단보도 앞에서 잠깐 멈춰 섰다.','그 순간, 강한 빛이 눈앞을 가득 채웠다.','트럭이었다.','쾅— 하는 소리와 함께 의식이 끊겼다.','…','다시 눈을 떴다.','여기는 내가 알던 곳이 아니었다.','앞에 무언가가 새겨져 있었다.','이건 뭐라고 적혀있는 걸까? 성경을 보면 알 수 있을 것 같다.']},
      {lines:['앞에 적힌 글자를 맞춰야 할 것 같다.'],quiz:{type:'text',question:'',answer:['예루살렘']}},
      {lines:['…예루살렘? 갑자기 엄청난 함성이 들려왔다.','나귀를 탄 한 사람이 예루살렘으로 들어오고 있었다.','사람들은 종려나무 가지를 흔들며 외쳤다. "호산나! 다윗의 자손이여! 주의 이름으로 오시는 이여, 호산나!"','나는 저분이 예수님이라는 것을 직감하고 따라가기로 했다.'],quiz:{type:'multiOX',question:'OX 퀴즈 (모두 맞춰야 통과)',items:[{q:'예수님은 말을 타고 예루살렘에 입성하셨다.',a:false},{q:'군중은 종려나무 가지를 흔들며 환영했다.',a:true},{q:'"호산나"는 "찬양합니다"라는 뜻이다.',a:false},{q:'예수님은 입성 후 바로 성전으로 가셨다.',a:true}]}},
      {lines:['군중을 따라 성전 마당으로 들어갔다. 그런데 성전이... 시장이 되어 있었다.','그때 예수님이 분노하시며 탁자를 뒤엎으시며 말씀하셨다.','"기록된 바, 내 집은 기도하는 집이라 하였거늘 너희는 강도의 소굴을 만드는도다!"','소란이 가라앉고, 벽에 걸려 있는 어떤 종이를 발견했다.'],quiz:{type:'text',question:'예배실 밖 게시판에 예루살렘 때부터 걸려 있던 종이가 있다. 그 종이를 보고 정답을 적어라',answer:['비둘기']}},
      {lines:['날이 저물고, 나는 어느 다락방 창문 밖에서 안을 들여다봤다.','예수님과 열두 제자가 모여 마지막 식사를 하고 있었다.\n"너희 중 하나가 나를 팔리라."','충격적인 말씀에 제자들이 술렁였다.\n저마다 "주여, 나는 아니지요?" 하고 물었다.','누가 배신자인지, 지금 이 자리에선 아무도 모르는 것 같았다.\n과연 그 자리에서 무슨 일이 있었던 걸까?'],quiz:{type:'multiOX',question:'방금 본 장면은 최후의 만찬 장면입니다. 요한복음 13장과 마태복음 26장을 참고하여 다음 문제를 풀어보세요.',items:[{q:'예수님은 식사 전에 제자들의 발을 직접 씻겨 주셨다.',a:true},{q:'베드로는 예수님이 자기 발을 씻기려 하자 처음부터 기꺼이 받아들였다.',a:false},{q:'예수님은 유다가 배신자라는 것을 그 자리에서 이미 알고 계셨다.',a:true},{q:'유다는 예수님께 "저는 아니지요?" 라고 묻지 않았다.',a:false},{q:'예수님이 떡을 주신 후 유다가 바로 다락방을 떠났고, 그때가 밤이었다.',a:true}]}},
      {lines:['식사가 끝나고 예수님은 겟세마네 동산으로 가셨다.','예수님 홀로 땅에 엎드려 기도하셨다.\n"아버지여, 할 수 있거든 이 잔을 지나가게 하옵소서.\n그러나 나의 원대로 마시옵고, 아버지의 원대로 하옵소서."','그때 횃불을 든 무리와 함께 한 사람이 나타났다. 그 사람이 예수님께 다가가 입을 맞추었다.',"나는 직감했다. '저 사람이... 유다구나.'"],quiz:{type:'coinSelect',question:'유다가 예수님을 팔고 얻은 은화의 갯수 만큼 은화를 누르세요.(마태복음 26장)',total:50,required:30}},
      {lines:['날이 밝았다. 나는 로마 총독 관저 밖에서 안을 들여다봤다.','빌라도는 “나는 이 사람에게서 아무 죄도 찾지 못하노라.”라고 말했다.','하지만 군중은 “십자가에 못 박으소서!”라고 외쳤다.','로마 총독 관저 외벽에 판결문이 붙어 있는 것이 보였다.'],quiz:{type:'text',question:'빌라도가 예수님께 내린 판결문이 보면대 어딘가에 붙어있습니다. 판결문을 보고 정답을 적어주세요.',answer:['바라바']}},
      {lines:['군인들이 예수님을 끌고 가 가시관을 씌우고 붉은 옷을 입혔다.\n"유대인의 왕이여, 평안할지어다!" 조롱이 이어졌다.','나는 차마 눈을 뜨고 볼 수가 없었다.','빌라도는 십자가 위에 패를 달게 했다.\n세 가지 언어로 이렇게 적었다.\n\'나사렛 예수, 유대인의 왕\'','나는 그 패를 보며 생각했다.\n왕이라고... 정말 왕이신 분인 걸까?'],quiz:{type:'text',question:'십자가 위에 달린 패는 어떤 언어로 쓰여졌을까요?(요한복음 19장)',answer:['히브리','로마','헬라']}},
      {lines:['나는 골고다 언덕으로 향했다. 다리가 무거웠다.','예수님이 십자가에 못 박히셨다. 온 땅이 어두워졌고, 성전 휘장이 찢어졌다.','예수님이 마지막 숨을 거두시기 직전, 한 마디를 남기셨다.','그 말씀이 내 귓가에 울렸다.'],quiz:{type:'letterSelect',question:'예수께서... 이르시되 O OOOO하시고 머리를 숙이니 영혼이 떠나가시리라 빈 칸에 들어갈 말을 찾으세요.(요한복음 19장)',letters:['거','캥','루','락','채','킹','탕','핑','다','치','일','이','삼','사','오','장','룡','였','창','었','형','먕','다','융','태','베','석','퉁','넝','햐'],required:['다','이','루','었','다']}},
      {lines:['사흘이 지나고, 나는 많이 지쳐서 골목 한켠에 앉아있었다.','그때 이른 아침, 막달라 마리아가 무덤으로 달려가는 것이 보였고 나도 그녀를 따라갔다.','입구의 돌이 굴려져 있는 무덤 안으로 들어가니 세마포가 가지런히 접혀 있었고 두 천사가 말했다.','"어찌하여 산 자를 죽은 자 가운데서 찾느냐? 그는 여기 계시지 않고, 살아나셨느니라!"'],quiz:{type:'mixedQuiz',question:'요한복음 20장을 읽고 문제를 풀어보세요.',items:[{type:'choice',q:'막달라 마리아가 빈 무덤 안에서 본 천사는 몇 명인가요?',choices:['1','2','3','4','5'],answer:'2'},{type:'text',q:'마리아는 처음에 예수님을 누구로 착각했나요?',answer:['동산지기']},{type:'text',q:'예수님이 마리아에게 하신 첫 마디는 무엇인가요?',answer:['여자여 어찌하여 울며 누구를 찾느냐']}]}},
      {lines:['나는 문이 굳게 닫혀 있는 제자들이 모인 방 안에 서 있었다.','그런데 갑자기 방 안에서 빛이 번쩍이고 목소리가 들렸다.\n"너희에게 평강이 있을지어다."','나와 제자들은 눈을 돌려 목소리가 들리는 쪽을 바라 보았다.','그 순간, 내가 그 자리에 있었다면 어떤 기분이었을지 생각해 보았다.'],quiz:{type:'text',question:'내가 제자들처럼 부활하신 예수님을 직접 마주했을 때 어떤 감정과 기분일지 적어주세요.',minChars:2}},
      {lines:['눈앞이 다시 새하얘졌다.','정신을 차려보니 나는 교회 안에 앉아 있었다.','방금까지의 일들이 꿈처럼 멀어지는 것 같았다.','하지만 내 손에는 분명, 모아 온 단서의 감각이 남아 있었다.']}
    ];
